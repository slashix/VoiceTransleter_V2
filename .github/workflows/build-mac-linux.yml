name: Build Windows and Linux

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS убран из сборки: этот форк ориентирован на CUDA-инференс
          # (NVIDIA GPU), которого физически нет ни на Intel Mac, ни на
          # Apple Silicon. Сборка под macOS давала бы CPU-only версию без
          # преимуществ форка — не вводим пользователей в заблуждение.
          - os: ubuntu-22.04
            platform: linux
            artifact_name: VoiceTransleter-V2-CUDA-Linux
          - os: windows-latest
            platform: win
            artifact_name: VoiceTransleter-V2-CUDA-Windows

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        # Проверка на CI, что зависимости вообще устанавливаются под Python
        # 3.12 (версия, которую использует форк). Реальная установка с
        # CUDA-версией torch происходит у конечного пользователя при первом
        # запуске приложения (см. python_deps.ts) — CI-раннеры без GPU не
        # могут проверить сам CUDA-инференс, только то, что пакеты ставятся.
        run: |
          python -m pip install --upgrade pip
          pip install faster-whisper "coqui-tts[codec]" "transformers==4.57.6"
        continue-on-error: true

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build app
        run: npx electron-vite build

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/latest*.yml
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.exe' -o -name 'latest*.yml' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VoiceTransleter V2 CUDA fork ${{ github.ref_name }}
          body: |
            ## VoiceTransleter V2 (CUDA fork) ${{ github.ref_name }}

            CUDA-версия форка — требует NVIDIA GPU для полноценного ускорения
            (работает и на CPU через автоматический fallback, но без ускорения).

            ### Downloads
            - **Windows**: `.exe` installer
            - **Linux**: `.AppImage` / `.deb`

            macOS не собирается — ни Intel, ни Apple Silicon Mac не имеют
            NVIDIA CUDA, весь смысл этого форка теряется без GPU-ускорения.
            Для macOS используйте [оригинальный проект](https://github.com/AndranikFutureLabs/VoiceTransleter_V2).

            ### Требования
            **FFmpeg** и **Python 3.12** с `faster-whisper` и `coqui-tts` — ставятся автоматически при первом запуске приложения, либо вручную (см. README).
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
